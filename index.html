<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="Assets/logo.png">
<meta charset="UTF-8">
<title>NOVAGuard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
text-align:center;
}

header{
background:#111827;
padding:25px;
font-size:42px;
font-weight:bold;
color:#4cc9ff;
}

.container{
padding:30px;
}

.camera-box{
width:700px;
height:400px;
margin:auto;
border:4px solid #4cc9ff;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
margin-top:30px;
}

.status{
margin-top:35px;
font-size:28px;
}

.safe{
color:lime;
}

.danger{
color:red;
font-weight:bold;
}

button{
margin:20px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
}

.alert{
display:none;
background:red;
padding:20px;
width:500px;
margin:30px auto;
border-radius:15px;
font-size:28px;
}


</style>
</head>
<body>

<header>NOVAGuard</header>
<img src="Assets/logo.png">

  
<div class="container">

<div class="camera-box">
Live Camera Feed Here
<!-- Later replace with webcam/video -->
</div>

<div class="status">
<p>Emotion: <span id="emotion">Calm</span></p>
<p>Threat Level: <span id="risk" class="safe">Safe</span></p>
</div>

<button onclick="triggerDanger()">
Simulate Danger
</button>

<button onclick="resetStatus()">
Reset
</button>

<div id="alertBox" class="alert">
⚠ POSSIBLE DISTRESS DETECTED
</div>

</div>

<script>
function triggerDanger(){
document.getElementById("emotion").innerText="Fear";
document.getElementById("risk").innerText="HIGH";
document.getElementById("risk").className="danger";
document.getElementById("alertBox").style.display="block";
}

function resetStatus(){
document.getElementById("emotion").innerText="Calm";
document.getElementById("risk").innerText="Safe";
document.getElementById("risk").className="safe";
document.getElementById("alertBox").style.display="none";
}
</script>

</body>
</html>
